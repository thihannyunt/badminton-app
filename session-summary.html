<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Court Connect - Match Result</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="phone">
        <header class="status-bar">
          <span class="status-time">9:41</span>
          <div class="status-notch" aria-hidden="true"></div>
          <div class="status-icons" aria-hidden="true">
            <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor">
              <rect x="0" y="5" width="3" height="6" rx="1" opacity="0.4"/>
              <rect x="4.5" y="2.5" width="3" height="8.5" rx="1" opacity="0.7"/>
              <rect x="9" y="0" width="3" height="11" rx="1"/>
            </svg>
            <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
              <rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke="currentColor" stroke-width="1.2"/>
              <rect x="2" y="2" width="15" height="7" rx="2" fill="currentColor"/>
              <path d="M22 3.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </header>

        <section class="screen screen-compact">
          <div class="top-row">
            <a class="back-button" href="history.html" aria-label="Back">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M8 10L4 6l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <div>
              <h1 class="screen-title">Match Result</h1>
              <p class="subtitle">25 Mar 2026 · Court 3</p>
            </div>
          </div>

          <div class="sheet tight sheet-compact">
            <div class="stack stack-compact">

              <div class="confirmed-banner">
                <div class="confirmed-check">✓</div>
                <div class="confirmed-info">
                  <p class="confirmed-court">Court 3 · Intermediate</p>
                  <p class="confirmed-time">7:00 PM – 9:00 PM &nbsp;·&nbsp; 2 hr session</p>
                </div>
                <span class="caption-pill confirmed-pill">Done</span>
              </div>

              <div class="result-score-card">
                <div class="result-score-top">
                  <span class="caption-pill">You Won</span>
                </div>
                <div class="result-score-row">
                  <div class="result-score-team">
                    <span class="result-team-label">Team A</span>
                    <span class="result-score-big">15</span>
                  </div>
                  <span class="result-score-dash">–</span>
                  <div class="result-score-team result-score-team-b">
                    <span class="result-team-label">Team B</span>
                    <span class="result-score-big result-score-big-b">12</span>
                  </div>
                </div>
              </div>

              <div class="match-detail-row match-detail-two">
                <div class="match-detail-item">
                  <span class="match-detail-icon">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                      <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.3"/>
                      <path d="M9 6v3.5l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                      <line x1="6.5" y1="2" x2="11.5" y2="2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                  </span>
                  <span class="match-detail-text">2 hr duration</span>
                </div>
                <div class="match-detail-item">
                  <span class="match-detail-icon">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                      <ellipse cx="8" cy="7" rx="4.5" ry="5.5" stroke="currentColor" stroke-width="1.3"/>
                      <line x1="8" y1="12.5" x2="11" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <line x1="5.5" y1="4.5" x2="10.5" y2="9.5" stroke="currentColor" stroke-width="0.9"/>
                      <line x1="3.5" y1="7" x2="12.5" y2="7" stroke="currentColor" stroke-width="0.9"/>
                    </svg>
                  </span>
                  <span class="match-detail-text">Doubles</span>
                </div>
              </div>

              <div class="vs-card">
                <div class="vs-team">
                  <div class="vs-team-label">Team A</div>
                  <div class="vs-players">
                    <div class="lobby-player-item">
                      <div class="lobby-avatar">A</div>
                      <strong>Alex</strong>
                    </div>
                    <div class="lobby-player-item">
                      <div class="lobby-avatar">K</div>
                      <strong>Ken</strong>
                    </div>
                  </div>
                </div>
                <div class="vs-divider">
                  <span class="vs-badge">VS</span>
                </div>
                <div class="vs-team">
                  <div class="vs-team-label team-b">Team B</div>
                  <div class="vs-players">
                    <div class="lobby-player-item">
                      <div class="lobby-avatar rotation-av-b">S</div>
                      <strong>Sara</strong>
                    </div>
                    <div class="lobby-player-item">
                      <div class="lobby-avatar rotation-av-b">M</div>
                      <strong>Mike</strong>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mvp-row">
                <div>
                  <span class="meta-note">Match MVP</span>
                  <strong>Alex</strong>
                </div>
                <div class="stars" aria-label="Five star rating">
                  <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
                </div>
              </div>

              <div class="button-grid">
                <a class="ghost-button" href="history.html">History</a>
                <a class="primary-button" href="player-feedback.html">Rate Players</a>
              </div>

            </div>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="index.html">
            <span>Home</span>
          </a>
          <a class="nav-item active" href="history.html">
            <span>History</span>
          </a>
          <a class="nav-item nav-center-fab" href="bookings.html">
            <span class="nav-fab-circle">
              <span class="nav-icon-wrap">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="2" y1="9" x2="18" y2="9" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="6" y1="2" x2="6" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="14" y1="2" x2="14" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="nav-dot-badge">2</span>
              </span>
            </span>
            <span>Book</span>
          </a>
          <a class="nav-item" href="leaderboard.html">
            <span>Ranks</span>
          </a>
          <a class="nav-item" href="profile.html">
            <span>Profile</span>
          </a>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
