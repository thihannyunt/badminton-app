<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Court Connect - Session Lobby</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone">
        <header class="status-bar">
          <span>9:41</span>
          <div class="status-icons" aria-hidden="true"><span></span><span></span><span></span></div>
        </header>

        <section class="screen screen-compact">
          <div class="top-row">
            <a class="back-button" href="invite-friends.html" aria-label="Back"></a>
            <div>
              <h1 class="screen-title">Session Lobby</h1>
              <p class="subtitle">Tuesday Smashers · Intermediate</p>
            </div>
          </div>

          <div class="sheet tight sheet-compact">
            <div class="stack stack-compact">

              <!-- Lobby fill progress -->
              <div class="lobby-status-card">
                <div class="lobby-status-top">
                  <span class="caption-pill">Lobby Full</span>
                  <span class="lobby-count">6 / 6</span>
                </div>
                <div class="progress-bar" aria-hidden="true">
                  <span style="width:100%"></span>
                </div>
              </div>

              <!-- Player list -->
              <div class="list-card">
                <strong>Players</strong>
                <div class="lobby-player-item">
                  <div class="lobby-avatar">S</div>
                  <strong>Shiraq</strong>
                  <span class="lobby-badge in">✓ In</span>
                </div>
                <div class="lobby-player-item">
                  <div class="lobby-avatar">P</div>
                  <strong>PPM</strong>
                  <span class="lobby-badge in">✓ In</span>
                </div>
                <div class="lobby-player-item">
                  <div class="lobby-avatar">Ps</div>
                  <strong>Pyae Sone</strong>
                  <span class="lobby-badge in">✓ In</span>
                </div>
                <div class="lobby-player-item">
                  <div class="lobby-avatar">M</div>
                  <strong>Mike</strong>
                  <span class="lobby-badge in">✓ In</span>
                </div>
                <div class="lobby-player-item">
                  <div class="lobby-avatar">T</div>
                  <strong>THN</strong>
                  <span class="lobby-badge in">✓ In</span>
                </div>
                <div class="lobby-player-item">
                  <div class="lobby-avatar">My</div>
                  <strong>Myat</strong>
                  <span class="lobby-badge in">✓ In</span>
                </div>
              </div>

              <!-- Generate teams -->
              <a class="primary-button" href="match-rotation.html">Generate Teams</a>

            </div>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="index.html">
            <span>Home</span>
          </a>
          <a class="nav-item" href="history.html">
            <span>History</span>
          </a>
          <a class="nav-item nav-center-fab" href="bookings.html">
            <span class="nav-fab-circle">
              <span class="nav-icon-wrap">
                <span class="nav-icon nav-booking"></span>
                <span class="nav-dot-badge">2</span>
              </span>
            </span>
            <span>Book</span>
          </a>
          <a class="nav-item" href="leaderboard.html">
            <span>Ranks</span>
          </a>
          <a class="nav-item" href="profile.html">
            <span>Profile</span>
          </a>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
