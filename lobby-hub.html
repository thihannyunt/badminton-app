<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Court Connect - Lobby</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="phone">
        <header class="status-bar">
          <span class="status-time">9:41</span>
          <div class="status-notch" aria-hidden="true"></div>
          <div class="status-icons" aria-hidden="true">
            <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor">
              <rect x="0" y="5" width="3" height="6" rx="1" opacity="0.4"/>
              <rect x="4.5" y="2.5" width="3" height="8.5" rx="1" opacity="0.7"/>
              <rect x="9" y="0" width="3" height="11" rx="1"/>
            </svg>
            <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
              <rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke="currentColor" stroke-width="1.2"/>
              <rect x="2" y="2" width="15" height="7" rx="2" fill="currentColor"/>
              <path d="M22 3.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </header>

        <section class="screen screen-compact">
          <div class="top-row">
            <a class="back-button" href="index.html" aria-label="Back">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M8 10L4 6l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <div>
              <h1 class="screen-title">Lobby</h1>
              <p class="subtitle">Create or join a private session.</p>
            </div>
          </div>

          <div class="sheet tight sheet-compact">
            <div class="stack stack-compact">

              <a class="lobby-hub-create" href="create-session.html">
                <div class="lobby-hub-create-left">
                  <span class="lobby-hub-icon">＋</span>
                  <div>
                    <p class="lobby-hub-create-title">Create New Lobby</p>
                    <p class="meta-note">Set date, time, players &amp; match type</p>
                  </div>
                </div>
                <span class="time-picker-arrow">›</span>
              </a>

              <div class="home-action-grid">
                <a class="home-action-btn ghost lobby-nav-btn" href="my-lobbies.html">
                  <span class="home-action-icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                      <rect x="3" y="4" width="14" height="15" rx="2" stroke="currentColor" stroke-width="1.5"/>
                      <path d="M7 4V3a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/>
                      <line x1="6" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                      <line x1="6" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </span>
                  <span class="home-action-label">My Lobbies</span>
                  <span class="home-action-sub">Lobbies you created</span>
                </a>
                <a class="home-action-btn ghost lobby-nav-btn" href="join-lobby.html">
                  <span class="home-action-icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                      <path d="M8 12l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                      <path d="M6.5 9.5l-2 2a3.5 3.5 0 004.95 4.95l2-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                      <path d="M13.5 10.5l2-2a3.5 3.5 0 00-4.95-4.95l-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </span>
                  <span class="home-action-label">Join Lobby</span>
                  <span class="home-action-sub">Enter code or link</span>
                </a>
              </div>

              <div class="info-row">
                <div>
                  <strong>How it works</strong>
                  <div class="meta-note">Create a lobby → invite friends → play together at your booked court.</div>
                </div>
              </div>

            </div>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="index.html">
            <span>Home</span>
          </a>
          <a class="nav-item" href="history.html">
            <span>History</span>
          </a>
          <a class="nav-item nav-center-fab" href="bookings.html">
            <span class="nav-fab-circle">
              <span class="nav-icon-wrap">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="2" y1="9" x2="18" y2="9" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="6" y1="2" x2="6" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="14" y1="2" x2="14" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="nav-dot-badge">2</span>
              </span>
            </span>
            <span>Book</span>
          </a>
          <a class="nav-item" href="leaderboard.html">
            <span>Ranks</span>
          </a>
          <a class="nav-item" href="profile.html">
            <span>Profile</span>
          </a>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
