<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Court Connect - Score Tracking</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone">
        <header class="status-bar">
          <span>9:41</span>
          <div class="status-icons" aria-hidden="true"><span></span><span></span><span></span></div>
        </header>

        <section class="screen screen-compact">
          <div class="top-row">
            <a class="back-button" href="match-confirmed.html" aria-label="Back"></a>
            <div>
              <h1 class="screen-title">Score Tracking</h1>
              <p class="subtitle">Court 3 · Live</p>
            </div>
            <span class="live-pill">● LIVE</span>
          </div>

          <div class="sheet tight sheet-compact">
            <div class="stack stack-compact">

              <!-- Scoreboard -->
              <div class="score-board-card">
                <!-- Team A -->
                <div class="score-team-col">
                  <p class="score-team-name">Team A</p>
                  <div class="score-players-mini">
                    <span>Alex</span>
                    <span>Ken</span>
                  </div>
                  <div class="score-big" id="scoreA">10</div>
                  <button class="score-add-btn" onclick="addScore('A')">+ Point</button>
                </div>

                <!-- Divider -->
                <div class="score-vs-col">
                  <span class="vs-badge">VS</span>
                  <div class="score-target">to 15</div>
                </div>

                <!-- Team B -->
                <div class="score-team-col">
                  <p class="score-team-name team-b-name">Team B</p>
                  <div class="score-players-mini">
                    <span>Sara</span>
                    <span>Mike</span>
                  </div>
                  <div class="score-big team-b-score" id="scoreB">8</div>
                  <button class="score-add-btn score-add-btn-b" onclick="addScore('B')">+ Point</button>
                </div>
              </div>

              <!-- Progress bars -->
              <div class="score-progress-row">
                <div class="score-progress-wrap">
                  <span class="score-progress-label">A</span>
                  <div class="progress-bar score-progress-bar">
                    <span id="barA" style="width: 67%"></span>
                  </div>
                </div>
                <div class="score-progress-wrap">
                  <span class="score-progress-label">B</span>
                  <div class="progress-bar score-progress-bar score-progress-bar-b">
                    <span id="barB" style="width: 53%"></span>
                  </div>
                </div>
              </div>

              <!-- End match -->
              <a class="primary-button" href="player-feedback.html">End Match</a>

            </div>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="index.html">
            <span>Home</span>
          </a>
          <a class="nav-item" href="history.html">
            <span>History</span>
          </a>
          <a class="nav-item nav-center-fab" href="bookings.html">
            <span class="nav-fab-circle">
              <span class="nav-icon-wrap">
                <span class="nav-icon nav-booking"></span>
                <span class="nav-dot-badge">2</span>
              </span>
            </span>
            <span>Book</span>
          </a>
          <a class="nav-item" href="leaderboard.html">
            <span>Ranks</span>
          </a>
          <a class="nav-item" href="profile.html">
            <span>Profile</span>
          </a>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>

    <script>
      const target = 15;
      let scores = { A: 10, B: 8 };

      function addScore(team) {
        scores[team]++;
        document.getElementById('score' + team).textContent = scores[team];
        const pct = Math.min((scores[team] / target) * 100, 100);
        document.getElementById('bar' + team).style.width = pct + '%';
        if (scores[team] >= target) {
          document.querySelector('.primary-button').textContent = 'Team ' + team + ' Wins! End Match';
        }
      }
    </script>
  </body>
</html>
