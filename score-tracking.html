<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Court Connect - Score Tracking</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="phone">
        <header class="status-bar">
          <span class="status-time">9:41</span>
          <div class="status-notch" aria-hidden="true"></div>
          <div class="status-icons" aria-hidden="true">
            <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor">
              <rect x="0" y="5" width="3" height="6" rx="1" opacity="0.4"/>
              <rect x="4.5" y="2.5" width="3" height="8.5" rx="1" opacity="0.7"/>
              <rect x="9" y="0" width="3" height="11" rx="1"/>
            </svg>
            <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
              <rect x="0.5" y="0.5" width="20" height="10" rx="3" stroke="currentColor" stroke-width="1.2"/>
              <rect x="2" y="2" width="15" height="7" rx="2" fill="currentColor"/>
              <path d="M22 3.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </header>

        <section class="screen screen-compact">
          <div class="top-row">
            <a class="back-button" href="match-confirmed.html" aria-label="Back">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M8 10L4 6l4-4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <div>
              <h1 class="screen-title">Score Tracking</h1>
              <p class="subtitle">Court 3 · Live</p>
            </div>
            <span class="live-pill">● LIVE</span>
          </div>

          <div class="sheet tight sheet-compact">
            <div class="stack stack-compact">

              <div class="score-board-card">
                <div class="score-team-col">
                  <p class="score-team-name">Team A</p>
                  <div class="score-players-mini">
                    <span>Alex</span>
                    <span>Ken</span>
                  </div>
                  <div class="score-big" id="score-a">10</div>
                  <div class="score-btn-row">
                    <button class="score-add-btn score-sub-btn" onclick="adjustScore('a', -1)">−</button>
                    <button class="score-add-btn" onclick="adjustScore('a', 1)">+</button>
                  </div>
                </div>

                <div class="score-vs-col">
                  <span class="vs-badge">VS</span>
                  <div class="score-target">to 21</div>
                </div>

                <div class="score-team-col">
                  <p class="score-team-name team-b-name">Team B</p>
                  <div class="score-players-mini">
                    <span>Sara</span>
                    <span>Mike</span>
                  </div>
                  <div class="score-big team-b-score" id="score-b">8</div>
                  <div class="score-btn-row">
                    <button class="score-add-btn score-add-btn-b score-sub-btn-b" onclick="adjustScore('b', -1)">−</button>
                    <button class="score-add-btn score-add-btn-b" onclick="adjustScore('b', 1)">+</button>
                  </div>
                </div>
              </div>

              <div class="score-progress-row">
                <div class="score-progress-wrap">
                  <span class="score-progress-label">A</span>
                  <div class="progress-bar score-progress-bar">
                    <span id="progress-a" style="width: 67%"></span>
                  </div>
                </div>
                <div class="score-progress-wrap">
                  <span class="score-progress-label">B</span>
                  <div class="progress-bar score-progress-bar score-progress-bar-b">
                    <span id="progress-b" style="width: 53%"></span>
                  </div>
                </div>
              </div>

              <a class="danger-button" href="player-feedback.html">End Match</a>

            </div>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="index.html">
            <span>Home</span>
          </a>
          <a class="nav-item" href="history.html">
            <span>History</span>
          </a>
          <a class="nav-item nav-center-fab" href="bookings.html">
            <span class="nav-fab-circle">
              <span class="nav-icon-wrap">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="2" y1="9" x2="18" y2="9" stroke="currentColor" stroke-width="1.5"/>
                  <line x1="6" y1="2" x2="6" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="14" y1="2" x2="14" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="nav-dot-badge">2</span>
              </span>
            </span>
            <span>Book</span>
          </a>
          <a class="nav-item" href="leaderboard.html">
            <span>Ranks</span>
          </a>
          <a class="nav-item" href="profile.html">
            <span>Profile</span>
          </a>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </main>

    <!-- Match Finish Modal -->
    <div id="match-finish-modal" class="match-modal-overlay" aria-modal="true" role="dialog" aria-labelledby="match-modal-title" hidden>
      <div class="match-modal">
        <div class="match-modal-icon">🏆</div>
        <h2 class="match-modal-title" id="match-modal-title">Match Finished!</h2>
        <p class="match-modal-msg" id="match-modal-msg">Team A wins the match!</p>
        <button class="primary-button match-modal-ok" onclick="closeMatchModal()">OK</button>
      </div>
    </div>

  <script src="./app.js"></script>
  </body>
</html>
